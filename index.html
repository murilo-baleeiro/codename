<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>CODENAME — Início</title>
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#1c1c1e" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500;600&display=swap"
    rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --cream: #faf8f3;
      --ink: #1c1c1e;
      --gold: #f0c040;
      --gray: #8a8a8a;
      --white: #ffffff;
    }

    html,
    body {
      height: 100%;
      overflow: hidden;
      background: var(--cream);
      font-family: "Barlow", sans-serif;
      color: var(--ink);
    }

    .layout {
      display: flex;
      flex-direction: column;
      height: 100vh;
      height: 100dvh;
      overflow-y: auto;
      align-items: center;
      justify-content: center;
      padding: 24px;
      gap: 14px;
      text-align: center;
    }

    .logo {
      font-family: "Black Han Sans", sans-serif;
      font-size: clamp(32px, 6vw, 56px);
      color: var(--ink);
      letter-spacing: 4px;
      text-transform: uppercase;
    }

    .logo span {
      color: var(--gold);
    }

    .subtitle {
      font-family: "Barlow Condensed", sans-serif;
      font-size: clamp(14px, 2.5vw, 20px);
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--gray);
    }

    .qr-wrapper {
      background: var(--white);
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.1);
      max-width: 280px;
      width: 100%;
    }

    .qr-wrapper img {
      display: block;
      width: 100%;
      height: auto;
      image-rendering: pixelated;
    }

    .qr-error {
      font-family: "Barlow Condensed", sans-serif;
      font-size: 13px;
      color: #c0392b;
      padding: 20px;
    }

    .room-code {
      font-family: "Black Han Sans", sans-serif;
      font-size: clamp(28px, 5vw, 42px);
      letter-spacing: 8px;
      color: var(--ink);
    }

    .room-label {
      font-family: "Barlow Condensed", sans-serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--gray);
    }

    .status {
      font-family: "Barlow Condensed", sans-serif;
      font-size: clamp(14px, 2vw, 18px);
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--gray);
      min-height: 1.4em;
    }

    .status .dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #ccc;
      margin-right: 8px;
      vertical-align: middle;
      animation: blink 1.2s infinite;
    }

    .status .dot.active {
      background: #2ecc71;
    }

    .status .dot.error {
      background: #c0392b;
      animation: none;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .game-starting {
      font-family: "Barlow Condensed", sans-serif;
      font-weight: 700;
      font-size: clamp(18px, 3vw, 24px);
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #2ecc71;
      display: none;
      animation: fadeInUp 0.4s ease;
    }

    .game-starting.visible { display: block; }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .url-text {
      font-family: "Barlow Condensed", sans-serif;
      font-size: clamp(12px, 1.8vw, 15px);
      color: var(--gray);
      word-break: break-all;
      max-width: 100%;
      padding: 0 16px;
    }

    .url-text a {
      color: var(--ink);
      font-weight: 600;
      text-decoration: none;
    }

    .url-text a:hover {
      text-decoration: underline;
    }

    .btn-copy {
      font-family: "Barlow Condensed", sans-serif;
      font-weight: 700;
      font-size: 12px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 6px 16px;
      border-radius: 6px;
      border: 1.5px solid var(--gray);
      cursor: pointer;
      background: transparent;
      color: var(--gray);
      transition: background 0.12s, color 0.12s;
    }

    .btn-copy:hover {
      background: var(--ink);
      color: #fff;
      border-color: var(--ink);
    }

    .btn-copy.copied {
      background: #2ecc71;
      color: #fff;
      border-color: #2ecc71;
    }

    .footer-tip {
      font-size: 12px;
      color: #bbb;
      font-family: "Barlow Condensed", sans-serif;
      letter-spacing: 1px;
      padding: 8px 0;
    }

    .footer-tip a {
      color: var(--ink);
      text-decoration: none;
      font-weight: 600;
    }

    .footer-tip a:hover {
      text-decoration: underline;
    }

    .alt-urls {
      font-size: 11px;
      color: #bbb;
      font-family: "Barlow Condensed", sans-serif;
      letter-spacing: 0.5px;
    }
  </style>
</head>

<body>
  <div class="layout">
    <div class="logo">CODE<span>NAME</span></div>
    <div class="subtitle">Escaneie o QR Code com seu celular</div>

    <div class="qr-wrapper" id="qr-wrapper">
      <div style="padding:40px 0;text-align:center;color:#ccc;font-family:Barlow Condensed,sans-serif;font-weight:600;letter-spacing:1px;font-size:14px">Gerando QR Code...</div>
    </div>

    <div class="room-label">Código da Sala</div>
    <div class="room-code" id="room-code">——</div>

    <div class="status" id="status">
      <span class="dot" id="status-dot"></span>
      <span id="status-text">Preparando...</span>
    </div>

    <div class="game-starting" id="game-starting">
      Mestre conectado! Iniciando partida...
    </div>

    <div class="url-text" id="url-text" style="display:none">
      Ou acesse: <a id="master-url" href="#" target="_blank">—</a>
      <button class="btn-copy" id="btn-copy" onclick="copyUrl()">Copiar</button>
    </div>

    <div class="alt-urls" id="alt-urls" style="display:none"></div>
  </div>

  <div class="footer-tip">
    <a href="/mestre">Acessar tela dos Mestres manualmente</a>
  </div>

  <script>
    var ROOM_ID = null;
    var ws = null;
    var qrUrls = [];

    function makeRoomId() {
      var chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
      var id = "";
      for (var i = 0; i < 6; i++) {
        id += chars.charAt(Math.floor(Math.random() * chars.length));
      }
      return id;
    }

    function fixViewportHeight() {
      var el = document.querySelector(".layout");
      if (!el) return;
      el.style.height = window.innerHeight + "px";
    }
    fixViewportHeight();
    window.addEventListener("resize", fixViewportHeight);

    function connectWS(onConnected) {
      var proto = location.protocol === "https:" ? "wss" : "ws";
      ws = new WebSocket(proto + "://" + location.host);

      ws.onopen = function () {
        setStatus("waiting", "Aguardando mestre escanear o QR Code...");
        ws.send(JSON.stringify({ type: "joinRoom", room: ROOM_ID, role: "tv" }));
        if (typeof onConnected === "function") {
          setTimeout(onConnected, 500);
        }
      };

      ws.onmessage = function (e) {
        var msg = JSON.parse(e.data);
        if (msg.type === "masterConnected") {
          setStatus("connected", "Mestre conectado! Iniciando partida...");
          document.getElementById("game-starting").classList.add("visible");
        } else if (msg.type === "gameStarting") {
          window.location.href = "/palavras?room=" + ROOM_ID;
        }
      };

      ws.onclose = function () {
        setStatus("disconnected", "Conexão perdida. Reconectando...");
        setTimeout(connectWS, 2000);
      };

      ws.onerror = function () { ws.close(); };
    }

    function setStatus(type, text) {
      var dot = document.getElementById("status-dot");
      dot.className = "dot";
      if (type === "connected") dot.classList.add("active");
      if (type === "error") dot.classList.add("error");
      document.getElementById("status-text").textContent = text;
    }

    function copyUrl() {
      var url = document.getElementById("master-url").textContent;
      if (!url) return;
      var btn = document.getElementById("btn-copy");

      // Try using the modern clipboard API
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(url).then(function () {
          btn.textContent = "Copiado!";
          btn.classList.add("copied");
          setTimeout(function () {
            btn.textContent = "Copiar";
            btn.classList.remove("copied");
          }, 2000);
        }).catch(function () {
          fallbackCopy(url);
        });
      } else {
        fallbackCopy(url);
      }
    }

    function fallbackCopy(text) {
      var ta = document.createElement("textarea");
      ta.value = text;
      ta.style.position = "fixed";
      ta.style.opacity = "0";
      document.body.appendChild(ta);
      ta.select();
      try {
        document.execCommand("copy");
        var btn = document.getElementById("btn-copy");
        btn.textContent = "Copiado!";
        btn.classList.add("copied");
        setTimeout(function () {
          btn.textContent = "Copiar";
          btn.classList.remove("copied");
        }, 2000);
      } catch (e) {}
      document.body.removeChild(ta);
    }

    function fetchQR() {
      var xhr = new XMLHttpRequest();
      xhr.open("GET", "/api/qr?room=" + ROOM_ID, true);
      xhr.onload = function () {
        if (xhr.status === 200) {
          var data = JSON.parse(xhr.responseText);
          qrUrls = data.urls || [];

          // Show QR image
          document.getElementById("qr-wrapper").innerHTML =
            '<img src="' + data.qr + '" alt="QR Code" />';

          // Show URL text
          var urlEl = document.getElementById("url-text");
          var linkEl = document.getElementById("master-url");
          urlEl.style.display = "block";
          linkEl.textContent = data.url;
          linkEl.href = data.url;

          // Show alternative URLs if more than one
          if (qrUrls.length > 1) {
            var altEl = document.getElementById("alt-urls");
            var altTexts = [];
            for (var i = 0; i < qrUrls.length; i++) {
              altTexts.push(qrUrls[i].replace("http://", ""));
            }
            altEl.textContent = "Ou: " + altTexts.join("  ·  ");
            altEl.style.display = "block";
          }
        } else {
          document.getElementById("qr-wrapper").innerHTML =
            '<div class="qr-error">Erro ao gerar QR Code. Use o link manual abaixo.</div>';
          setStatus("error", "Falha ao gerar QR Code");
        }
      };
      xhr.onerror = function () {
        document.getElementById("qr-wrapper").innerHTML =
          '<div class="qr-error">Erro de conexão. Use o link manual abaixo.</div>';
        setStatus("error", "Falha ao gerar QR Code");
      };
      xhr.send();
    }

    // Generate room ID immediately, but only fetch QR after WebSocket connects
    ROOM_ID = makeRoomId();
    document.getElementById("room-code").textContent = ROOM_ID;
    connectWS(fetchQR);
  </script>
</body>

</html>
