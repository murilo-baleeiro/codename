<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>CODENAME — Tela dos Mestres</title>
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#1c1c1e" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="apple-touch-icon" href="/icon-192.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500;600&display=swap"
    rel="stylesheet" />
  <style>
    /* ── Reset & Variables ─────────────────────────────── */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --green: #1a7a4a;
      --green-light: #d4f0e2;
      --green-bg: #eafaf2;
      --blue: #1a4d8f;
      --blue-light: #cce0ff;
      --blue-bg: #e8f1ff;
      --gray: #8a8a8a;
      --gray-light: #e8e8e8;
      --gray-bg: #f5f5f5;
      --black-card: #111111;
      --black-text: #ffffff;
      --cream: #faf8f3;
      --ink: #1c1c1e;
      --border: #d0cec8;
      --header-h: 44px;
      --footer-h: 40px;
      --white: #ffffff;
    }

    html,
    body {
      height: 100%;
      overflow: hidden;
      background: var(--cream);
      font-family: "Barlow", sans-serif;
      color: var(--ink);
    }

    /* ── Layout ────────────────────────────────────────── */
    .layout {
      display: flex;
      flex-direction: column;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
    }

    /* ── Header ────────────────────────────────────────── */
    header {
      height: var(--header-h);
      background: var(--ink);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 10px;
      flex-shrink: 0;
      gap: 6px;
    }

    .logo {
      font-family: "Black Han Sans", sans-serif;
      font-size: 16px;
      color: #fff;
      letter-spacing: 2px;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .logo span {
      color: #f0c040;
    }

    .badge-master {
      display: none;
    }

    .room-badge {
      background: rgba(255, 255, 255, 0.1);
      color: #ccc;
      font-family: "Barlow Condensed", sans-serif;
      font-weight: 700;
      font-size: 10px;
      letter-spacing: 1px;
      padding: 2px 6px;
      border-radius: 4px;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .scores {
      display: flex;
      gap: 4px;
      align-items: center;
    }

    .score-chip {
      font-family: "Barlow Condensed", sans-serif;
      font-weight: 700;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 4px;
      letter-spacing: 0.5px;
      white-space: nowrap;
    }

    .score-chip.green {
      background: var(--green-light);
      color: var(--green);
    }

    .score-chip.blue {
      background: var(--blue-light);
      color: var(--blue);
    }

    .score-chip .num {
      font-size: 14px;
    }

    /* ── Grid Area ─────────────────────────────────────── */
    .grid-area {
      flex: 1;
      display: flex;
      align-items: stretch;
      justify-content: stretch;
      padding: 8px;
      overflow: hidden;
      min-height: 0;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      grid-template-rows: repeat(5, 1fr);
      gap: 8px;
      width: 100%;
      height: 100%;
    }

    /* ── Cards ─────────────────────────────────────────── */
    .card {
      width: 100%;
      height: 100%;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition:
        transform 0.12s,
        box-shadow 0.12s,
        filter 0.2s;
      position: relative;
      overflow: hidden;
      min-height: 0;
      user-select: none;
    }

    .card:hover {
      transform: scale(1.04);
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.18);
      z-index: 2;
    }

    .card:active {
      transform: scale(0.97);
    }

    .card-word {
      font-family: "Barlow Condensed", sans-serif;
      font-weight: 700;
      text-align: center;
      letter-spacing: 0.5px;
      line-height: 1.1;
      padding: 2px 4px;
      text-transform: uppercase;
      overflow-wrap: break-word;
      word-break: break-word;
      hyphens: auto;
    }

    /* Color variants */
    .card.green {
      background: var(--green);
    }

    .card.green .card-word {
      color: var(--white);
    }

    .card.blue {
      background: var(--blue);
    }

    .card.blue .card-word {
      color: var(--white);
    }

    .card.gray {
      background: var(--border);
    }

    .card.gray .card-word {
      color: var(--gray);
    }

    .card.black {
      background: var(--black-card);
    }

    .card.black .card-word {
      color: var(--black-text);
    }

    /* Revealed overlay */
    .card.revealed {
      filter: brightness(0.55) saturate(0.4);
      cursor: default;
    }

    .card.revealed:hover {
      transform: none;
      box-shadow: none;
    }

    .card.revealed::after {
      content: "✓";
      position: absolute;
      font-size: 28px;
      color: rgba(255, 255, 255, 0.7);
      font-weight: 900;
    }

    .card.black.revealed::after {
      color: rgba(255, 255, 255, 0.6);
      content: "☠";
    }

    /* ── Legend ─────────────────────────────────────────── */
    .legend-bar {
      display: flex;
      justify-content: center;
      gap: 18px;
      padding: 4px 16px;
      flex-shrink: 0;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: "Barlow Condensed", sans-serif;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--gray);
    }

    .legend-swatch {
      width: 14px;
      height: 14px;
      border-radius: 3px;
      border: 1.5px solid rgba(0, 0, 0, 0.15);
    }

    .legend-swatch.green {
      background: var(--green);
    }

    .legend-swatch.blue {
      background: var(--blue);
    }

    .legend-swatch.gray {
      background: var(--gray);
    }

    .legend-swatch.black {
      background: var(--black-card);
    }

    /* ── Footer ─────────────────────────────────────────── */
    footer {
      height: var(--footer-h);
      background: #f0ede6;
      border-top: 1.5px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 10px;
      flex-shrink: 0;
      gap: 6px;
    }

    .footer-left {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .status-pill {
      font-family: "Barlow Condensed", sans-serif;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 2px 8px;
      border-radius: 12px;
      background: #e0ddd8;
      color: var(--gray);
      white-space: nowrap;
    }

    .status-pill.active {
      background: var(--green-light);
      color: var(--green);
    }

    .status-pill.gameover {
      background: #fde8e8;
      color: #c0392b;
    }

    .footer-btns {
      display: flex;
      gap: 4px;
    }

    .btn {
      font-family: "Barlow Condensed", sans-serif;
      font-weight: 700;
      font-size: 11px;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 4px;
      border: none;
      cursor: pointer;
      transition:
        background 0.15s,
        transform 0.1s,
        opacity 0.15s;
    }

    .btn:active {
      transform: scale(0.96);
    }

    .btn:disabled,
    .btn-newgame-banner:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      transform: none !important;
      pointer-events: none;
    }

    .btn-new {
      background: var(--ink);
      color: #fff;
    }

    .btn-new:hover {
      background: #333;
    }

    /* ── Modal Confirm ──────────────────────────────────── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.55);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.open {
      display: flex;
    }

    .modal {
      background: #fff;
      border-radius: 14px;
      padding: 30px 32px;
      max-width: 380px;
      width: 90%;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
      text-align: center;
      animation: modalIn 0.2s ease;
    }

    @keyframes modalIn {
      from {
        transform: scale(0.88);
        opacity: 0;
      }

      to {
        transform: scale(1);
        opacity: 1;
      }
    }

    .modal-icon {
      font-size: 38px;
      margin-bottom: 12px;
    }

    .modal-title {
      font-family: "Black Han Sans", sans-serif;
      font-size: 20px;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .modal-word {
      font-family: "Barlow Condensed", sans-serif;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 3px;
      margin: 8px 0 16px;
      padding: 10px 18px;
      border-radius: 8px;
      display: inline-block;
    }

    .modal-word.green {
      background: var(--green-bg);
      color: var(--green);
    }

    .modal-word.blue {
      background: var(--blue-bg);
      color: var(--blue);
    }

    .modal-word.gray {
      background: var(--gray-bg);
      color: var(--gray);
    }

    .modal-word.black {
      background: var(--black-card);
      color: #fff;
    }

    .modal-subtitle {
      font-size: 13px;
      color: #888;
      margin-bottom: 22px;
    }

    .modal-buttons {
      display: flex;
      gap: 10px;
      justify-content: center;
    }

    .modal-btn {
      font-family: "Barlow Condensed", sans-serif;
      font-weight: 700;
      font-size: 14px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 10px 24px;
      border-radius: 7px;
      border: none;
      cursor: pointer;
      transition: background 0.12s;
    }

    .modal-btn.confirm {
      background: var(--ink);
      color: #fff;
    }

    .modal-btn.confirm:hover {
      background: #333;
    }

    .modal-btn.cancel {
      background: var(--gray-light);
      color: var(--ink);
    }

    .modal-btn.cancel:hover {
      background: #d8d8d8;
    }

    /* ── Game Over Banner ───────────────────────────────── */
    .gameover-banner {
      display: none;
      position: fixed;
      top: var(--header-h);
      left: 0;
      right: 0;
      background: rgba(255, 255, 255, 0.96);
      border-bottom: 3px solid;
      padding: 14px 24px;
      text-align: center;
      z-index: 50;
      animation: slideDown 0.3s ease;
    }

    @keyframes slideDown {
      from {
        transform: translateY(-100%);
      }

      to {
        transform: translateY(0);
      }
    }

    .gameover-banner.active {
      display: block;
    }

    .gameover-banner.green {
      border-color: var(--green);
    }

    .gameover-banner.blue {
      border-color: var(--blue);
    }

    .gameover-banner.black {
      border-color: #111;
    }

    .gameover-text {
      font-family: "Black Han Sans", sans-serif;
      font-size: 20px;
      letter-spacing: 3px;
    }

    .gameover-banner.green .gameover-text {
      color: var(--green);
    }

    .gameover-banner.blue .gameover-text {
      color: var(--blue);
    }

    .gameover-banner.black .gameover-text {
      color: #111;
    }

    .gameover-banner-inner {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 18px;
    }

    .btn-newgame-banner {
      font-family: "Barlow Condensed", sans-serif;
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 7px 20px;
      border-radius: 6px;
      border: 2px solid currentColor;
      cursor: pointer;
      background: transparent;
      transition:
        background 0.15s,
        color 0.15s,
        transform 0.1s;
    }

    .gameover-banner.green .btn-newgame-banner {
      color: var(--green);
    }

    .gameover-banner.blue .btn-newgame-banner {
      color: var(--blue);
    }

    .gameover-banner.black .btn-newgame-banner {
      color: #111;
    }

    .btn-newgame-banner:hover {
      opacity: 0.75;
    }

    .btn-newgame-banner:active {
      transform: scale(0.96);
    }

    /* ── Connection status ──────────────────────────────── */
    .conn-status {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 10px;
      color: #aaa;
      font-family: "Barlow Condensed", sans-serif;
      letter-spacing: 0.5px;
      white-space: nowrap;
    }

    .conn-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #ccc;
      display: inline-block;
      flex-shrink: 0;
    }

    .conn-dot.on {
      background: #2ecc71;
    }

    /* ── Responsive font sizes for cards ───────────────── */
    @media (max-width: 600px) {
      .badge-master {
        display: none;
      }
    }

    @media (max-width: 400px) {
      .score-chip {
        font-size: 10px;
        padding: 1px 5px;
      }

      .score-chip .num {
        font-size: 12px;
      }

      .logo {
        font-size: 14px;
      }

      .room-badge {
        font-size: 9px;
        padding: 1px 4px;
      }

      .conn-status {
        font-size: 9px;
      }

      .btn {
        font-size: 10px;
        padding: 3px 8px;
      }

      .status-pill {
        font-size: 9px;
        padding: 1px 6px;
      }
    }
  </style>
</head>

<body>
  <div class="layout">
    <!-- Header -->
    <header>
      <div style="display: flex; align-items: center; gap: 12px">
        <span class="logo">CODE<span>NAME</span></span>
        <span class="badge-master">🔑 Tela dos Mestres</span>
        <span class="room-badge" id="room-badge" style="display:none">SALA <span id="room-id-display">—</span></span>
      </div>
      <div class="scores">
        <span class="score-chip green">🟢 VERDE <span class="num" id="score-green">0</span>/10</span>
        <span class="score-chip blue">🔵 AZUL <span class="num" id="score-blue">0</span>/10</span>
      </div>
      <div class="conn-status">
        <span class="conn-dot" id="conn-dot"></span>
        <span id="conn-label">Conectando...</span>
      </div>
    </header>

    <!-- Grid -->
    <div class="grid-area">
      <div class="grid" id="grid"></div>
    </div>

    <!-- Footer -->
    <footer>
      <div class="footer-left">
        <span class="conn-dot" id="conn-dot2"></span>
        <span class="status-pill" id="status-pill">Aguardando...</span>
      </div>
      <div class="footer-btns">
        <button class="btn btn-new" id="btn-new-game">
          🔄 Novo Jogo
        </button>
      </div>
    </footer>
  </div>

  <!-- Confirm Reveal Modal -->
  <div class="modal-overlay" id="reveal-modal">
    <div class="modal">
      <div class="modal-icon">👁</div>
      <div class="modal-title">Revelar Palavra?</div>
      <div id="modal-word-display" class="modal-word">—</div>
      <div class="modal-subtitle">
        Esta ação irá revelar a cor desta palavra para todos os jogadores.
      </div>
      <div class="modal-buttons">
        <button class="modal-btn cancel" id="btn-modal-cancel">
          Cancelar
        </button>
        <button class="modal-btn confirm" id="btn-modal-confirm">
          Revelar
        </button>
      </div>
    </div>
  </div>

  <!-- Confirm New Game Modal -->
  <div class="modal-overlay" id="newgame-modal">
    <div class="modal">
      <div class="modal-icon">🔄</div>
      <div class="modal-title">Novo Jogo?</div>
      <p style="font-size: 14px; color: #666; margin-bottom: 20px">
        Todas as palavras e pontuações serão reiniciadas.<br />Palavras novas
        serão sorteadas.
      </p>
      <div class="modal-buttons">
        <button class="modal-btn cancel" id="btn-newgame-cancel">
          Cancelar
        </button>
        <button class="modal-btn confirm" id="btn-newgame-confirm">
          Confirmar
        </button>
      </div>
    </div>
  </div>

  <!-- Game Over Banner -->
  <div class="gameover-banner" id="gameover-banner">
    <div class="gameover-banner-inner">
      <div class="gameover-text" id="gameover-text"></div>
      <button class="btn-newgame-banner" id="btn-newgame-banner">
        🔄 Novo Jogo
      </button>
    </div>
  </div>

  <script>
    (function () {
      // ─── Utility ──────────────────────────────────────────
      function getQueryParam(name) {
        var match = location.search.match(new RegExp("[?&]" + name + "=([^&#]*)"));
        return match ? decodeURIComponent(match[1]) : null;
      }

      var ROOM_ID = getQueryParam("room");
      if (!ROOM_ID) {
        document.getElementById("conn-label").textContent = "QR Code inválido! Escaneie novamente.";
        document.querySelector(".grid-area").innerHTML =
          '<div style="text-align:center;padding:40px;color:#999;font-family:Barlow Condensed,sans-serif;font-weight:600;font-size:18px;letter-spacing:1px">' +
          'Código de sala não encontrado.<br>Escaneie o QR Code da tela inicial para acessar.</div>';
        return;
      }

      // ─── State ────────────────────────────────────────────
      var gameState = null;
      var pendingRevealIndex = null;
      var newGameCooldownTimer = null;
      var newGameCooldownDone = false;
      var pollTimer = null;
      var pairDone = false;

      // ─── DOM refs (cached once) ──────────────────────────
      var $ = function (id) { return document.getElementById(id); };
      var gridEl = $("grid");
      var scoreGreen = $("score-green");
      var scoreBlue = $("score-blue");
      var statusPill = $("status-pill");
      var gameoverBanner = $("gameover-banner");
      var gameoverText = $("gameover-text");
      var connLabel = $("conn-label");
      var connDots = document.querySelectorAll(".conn-dot");
      var roomBadge = $("room-badge");
      var roomIdDisplay = $("room-id-display");
      var revealModal = $("reveal-modal");
      var modalWordDisplay = $("modal-word-display");

      // ─── Fix mobile viewport height ─────────────────────
      (function fixViewport() {
        var el = document.querySelector(".layout");
        if (!el) return;
        el.style.height = window.innerHeight + "px";
        window.addEventListener("resize", function () {
          el.style.height = window.innerHeight + "px";
        });
      })();

      // ─── Connection status ──────────────────────────────
      function setConn(on, label) {
        for (var i = 0; i < connDots.length; i++) {
          connDots[i].classList.toggle("on", on);
        }
        if (label) { connLabel.textContent = label; }
      }

      // ─── HTTP: Pair with server ─────────────────────────
      function pairWithServer() {
        if (pairDone) return;
        setConn(true, "Conectando...");

        var xhr = new XMLHttpRequest();
        xhr.open("POST", "/api/pair-room", true);
        xhr.setRequestHeader("Content-Type", "application/json");
        xhr.onload = function () {
          if (xhr.status === 200) {
            pairDone = true;
            roomBadge.style.display = "inline";
            roomIdDisplay.textContent = ROOM_ID;
            setConn(true, "Conectado à sala " + ROOM_ID);
            startPolling();
          } else {
            var msg = "Erro ao conectar";
            try { var d = JSON.parse(xhr.responseText); msg = d.error || msg; } catch (e) { }
            setConn(false, msg + ". Toque para tentar novamente.");
          }
        };
        xhr.onerror = function () {
          setConn(false, "Falha de conexão. Toque para tentar novamente.");
        };
        xhr.send(JSON.stringify({ room: ROOM_ID }));
      }

      // ─── HTTP: Poll game state ──────────────────────────
      function startPolling() {
        fetchState();
        pollTimer = setInterval(fetchState, 2000);
      }

      function fetchState() {
        var xhr = new XMLHttpRequest();
        xhr.open("GET", "/api/game-state", true);
        xhr.onload = function () {
          if (xhr.status === 200) {
            try {
              var state = JSON.parse(xhr.responseText);
              gameState = state;
              render();
            } catch (e) {
              // JSON parse error — ignore
            }
          }
        };
        xhr.send();
      }

      // ─── HTTP: Actions ──────────────────────────────────
      function revealWord(index) {
        var xhr = new XMLHttpRequest();
        xhr.open("POST", "/api/reveal-word", true);
        xhr.setRequestHeader("Content-Type", "application/json");
        xhr.onload = function () {
          if (xhr.status === 200) {
            try {
              var data = JSON.parse(xhr.responseText);
              gameState = data.gameState;
              render();
            } catch (e) { }
          }
        };
        xhr.send(JSON.stringify({ index: index }));
      }

      function sendNewGameReq() {
        var xhr = new XMLHttpRequest();
        xhr.open("POST", "/api/new-game", true);
        xhr.setRequestHeader("Content-Type", "application/json");
        xhr.onload = function () {
          if (xhr.status === 200) fetchState();
        };
        xhr.send(JSON.stringify({}));
      }

      // ─── Render ─────────────────────────────────────────
      function render() {
        if (!gameState) return;

        // Scores
        scoreGreen.textContent = gameState.scores.green;
        scoreBlue.textContent = gameState.scores.blue;

        // Status pill
        if (gameState.gameOver) {
          statusPill.textContent = "Jogo Encerrado";
          statusPill.className = "status-pill gameover";
        } else if (gameState.started) {
          statusPill.textContent = "Jogo em Andamento";
          statusPill.className = "status-pill active";
        } else {
          statusPill.textContent = "Aguardando...";
          statusPill.className = "status-pill";
        }

        // Game over banner
        renderGameOver();

        // Cooldown (only once per game over, not re-triggered on every poll)
        if (gameState.gameOver) {
          if (newGameCooldownTimer === null && !newGameCooldownDone) {
            setNewGameEnabled(false);
            newGameCooldownTimer = setTimeout(function () {
              setNewGameEnabled(true);
              newGameCooldownTimer = null;
              newGameCooldownDone = true;
            }, 5000);
          }
        } else {
          if (newGameCooldownTimer !== null) {
            clearTimeout(newGameCooldownTimer);
            newGameCooldownTimer = null;
          }
          newGameCooldownDone = false;
          setNewGameEnabled(true);
        }

        // Grid
        gridEl.innerHTML = "";
        if (!gameState.started) {
          gridEl.style.display = "flex";
          gridEl.style.alignItems = "center";
          gridEl.style.justifyContent = "center";
          gridEl.innerHTML =
            '<div style="text-align:center;padding:20px;color:#999;font-family:\'Barlow Condensed\',sans-serif;font-weight:600;font-size:clamp(16px,3vw,24px);letter-spacing:1.5px">' +
            '<div style="font-size:clamp(40px,8vw,64px);margin-bottom:12px">\uD83C\uDCCF</div>' +
            '<div>Aguardando o in\u00EDcio do jogo...</div>' +
            '<div style="font-size:clamp(12px,1.8vw,16px);color:#bbb;margin-top:8px">O mestre deve iniciar a partida no tel\u00E3o</div></div>';
          return;
        }
        gridEl.style.display = "grid";

        var html = "";
        for (var i = 0; i < gameState.words.length; i++) {
          var entry = gameState.words[i];
          var colorClass = entry.color;
          var revealedClass = entry.revealed ? " revealed" : "";
          html += '<div class="card ' + colorClass + revealedClass + '" data-index="' + i + '">' +
            '<span class="card-word" style="font-size:' + getFontSize(entry.word.length) + '">' +
            escapeHtml(entry.word) + '</span></div>';
        }
        gridEl.innerHTML = html;

        // Attach click handlers
        if (!gameState.gameOver) {
          var cards = gridEl.querySelectorAll(".card:not(.revealed)");
          for (var i = 0; i < cards.length; i++) {
            (function (idx) {
              cards[i].addEventListener("click", function () {
                openRevealModal(parseInt(this.getAttribute("data-index")));
              });
            })(i);
          }
        }
      }

      function getFontSize(len) {
        if (len <= 5) return "clamp(15px, 2.3vw, 26px)";
        if (len <= 8) return "clamp(14px, 2vw, 23px)";
        if (len <= 11) return "clamp(13px, 1.7vw, 20px)";
        return "clamp(12px, 1.4vw, 17px)";
      }

      function escapeHtml(str) {
        return String(str)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function setNewGameEnabled(enabled) {
        var btns = document.querySelectorAll(".btn-new, .btn-newgame-banner");
        for (var i = 0; i < btns.length; i++) {
          btns[i].disabled = !enabled;
        }
      }

      function renderGameOver() {
        if (!gameState || !gameState.gameOver) {
          gameoverBanner.className = "gameover-banner";
          return;
        }
        gameoverBanner.classList.add("active");
        var w = gameState.winner;
        if (w === "green") {
          gameoverBanner.classList.add("green");
          gameoverText.textContent = "\uD83C\uDFC6 EQUIPE VERDE VENCEU!";
        } else if (w === "blue") {
          gameoverBanner.classList.add("blue");
          gameoverText.textContent = "\uD83C\uDFC6 EQUIPE AZUL VENCEU!";
        } else {
          gameoverBanner.classList.add("black");
          gameoverText.textContent = "\u2620 FIM DE JOGO";
        }
      }

      // ─── Modal Reveal ──────────────────────────────────
      function openRevealModal(index) {
        if (!gameState || gameState.gameOver) return;
        var entry = gameState.words[index];
        if (!entry || entry.revealed) return;
        pendingRevealIndex = index;
        modalWordDisplay.textContent = entry.word;
        modalWordDisplay.className = "modal-word " + entry.color;
        revealModal.classList.add("open");
      }

      function closeModal() {
        pendingRevealIndex = null;
        revealModal.classList.remove("open");
      }

      function confirmReveal() {
        if (pendingRevealIndex === null) return;
        revealWord(pendingRevealIndex);
        closeModal();
      }

      // ─── New Game ───────────────────────────────────────
      function confirmNewGame() {
        $("newgame-modal").classList.add("open");
      }
      function closeNewGameModal() {
        $("newgame-modal").classList.remove("open");
      }
      function sendNewGame() {
        var btn = document.querySelector(".btn-new");
        if (btn && btn.disabled) return;
        sendNewGameReq();
        closeNewGameModal();
      }

      // ─── Event listeners ───────────────────────────────
      revealModal.addEventListener("click", function (e) {
        if (e.target === this) closeModal();
      });
      $("newgame-modal").addEventListener("click", function (e) {
        if (e.target === this) closeNewGameModal();
      });
      document.addEventListener("keydown", function (e) {
        if (e.key === "Escape") { closeModal(); closeNewGameModal(); }
        if (e.key === "Enter" && revealModal.classList.contains("open")) {
          confirmReveal();
        }
      });
      connLabel.addEventListener("click", function () {
        pairWithServer();
      });

      // ─── Button handlers (replaces onclick attributes) ─
      $("btn-new-game").addEventListener("click", confirmNewGame);
      $("btn-newgame-banner").addEventListener("click", confirmNewGame);
      $("btn-modal-cancel").addEventListener("click", closeModal);
      $("btn-modal-confirm").addEventListener("click", confirmReveal);
      $("btn-newgame-cancel").addEventListener("click", closeNewGameModal);
      $("btn-newgame-confirm").addEventListener("click", sendNewGame);

      // ─── Service Worker ─────────────────────────────────
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("/sw.js");
      }

      // ─── Init ──────────────────────────────────────────
      // Restore from localStorage
      try {
        var saved = localStorage.getItem("codename_master_state");
        if (saved) {
          try {
            gameState = JSON.parse(saved);
            render();
          } catch (e) { }
        }
      } catch (e) { }

      // Start HTTP pairing immediately — no WebSocket at all
      pairWithServer();
    })();
  </script>
</body>

</html>
